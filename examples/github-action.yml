# TEMPLATE: copy this into YOUR Power BI models repository as
# .github/workflows/copilot-readiness.yml
#
# It is intentionally NOT placed in this package's own .github/workflows, because
# this package contains only test fixtures (one of which is deliberately broken),
# so running the gate here would always fail. Use it in a repo that holds real
# .SemanticModel folders.
#
# Gates Power BI models for Copilot readiness: posts the scorecard as a sticky PR
# comment, writes it to the run summary, and fails the check when a model is not
# ready.

name: Copilot Readiness

on:
  pull_request:
    paths:
      - "**/*.SemanticModel/**"
      - "readiness.yaml"
  push:
    branches: [main, master]
    paths:
      - "**/*.SemanticModel/**"
      - "readiness.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the linter
        run: pip install "copilot-readiness-linter @ git+https://github.com/mchl-schrdng/powerbi-copilot-readiness@main"

      - name: Build the scorecard (markdown)
        run: copilot-readiness lint . --config readiness.yaml --format markdown --output report.md || true

      - name: Write the job summary
        run: cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post scorecard as a sticky PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          marker="<!-- copilot-readiness-linter -->"
          # gh has no native sticky comment, so find our previous comment by marker
          # and edit it in place; otherwise create a new one.
          comment_id=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq "[.[] | select(.body | contains(\"$marker\"))][0].id" 2>/dev/null || true)
          if [ -n "$comment_id" ] && [ "$comment_id" != "null" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$comment_id" \
              -F body=@report.md >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body-file report.md
          fi

      - name: Enforce the gate (annotations + exit code)
        # 'github' format emits ::error annotations per blocking gate, ::warning
        # for INCOMPLETE models, and a ::notice summary. It exits non-zero unless
        # every model is READY. Add --allow-incomplete to fail only on genuine
        # defects, not a missing fact-table declaration.
        run: copilot-readiness lint . --config readiness.yaml --format github
